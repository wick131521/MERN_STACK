<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Reservation</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4") no-repeat center/cover;
}

.container{
background:rgba(0,0,0,0.8);
padding:40px;
width:380px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
color:white;
}

.container h2{
text-align:center;
margin-bottom:25px;
color:#ffb347;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:5px;
font-size:14px;
}

.input-group input,
.input-group select{
width:100%;
padding:10px;
border-radius:5px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:5px;
background:#ff6b35;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff3d00;
}

.footer-text{
text-align:center;
margin-top:15px;
font-size:13px;
color:#ddd;
}

</style>

</head>

<body>

<div class="container">

<h2>Restaurant Booking</h2>

<form>

<div class="input-group">
<label>Customer Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number" required>
</div>

<div class="input-group">
<label>Date</label>
<input type="date" required>
</div>

<div class="input-group">
<label>Time</label>
<input type="time" required>
</div>

<div class="input-group">
<label>Number of Guests</label>
<select>
<option>1 Person</option>
<option>2 People</option>
<option>3 People</option>
<option>4 People</option>
<option>5+ People</option>
</select>
</div>

<button type="submit">Reserve Table</button>

<div class="footer-text">
Welcome to our restaurant 🍽️
</div>

</form>

</div>

</body>
</html>
